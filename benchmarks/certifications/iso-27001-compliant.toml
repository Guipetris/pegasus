[test]
id = "iso-27001-compliant"
target = "google.com"
description = "Well-configured major site — should satisfy the TLS/HTTP/network controls in ISO 27001:2022 Annex A.8 and A.5 that Pegasus can probe"
category = "certifications"
standards = ["iso-27001-2022"]

[expected]
overall_verdict = "compliant"

