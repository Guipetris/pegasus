name: Release
on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Rename binary with platform suffix
        run: cp target/${{ matrix.target }}/release/generate_schemas generate_schemas-${{ matrix.target }}
      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22  # v4.1.0
      - name: Sign binary with cosign (keyless)
        run: |
          cosign sign-blob --yes \
            --bundle generate_schemas-${{ matrix.target }}.bundle \
            generate_schemas-${{ matrix.target }}
      - name: Generate artifact attestation
        id: attest
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-path: generate_schemas-${{ matrix.target }}
      - name: Export provenance as .intoto.jsonl for Scorecard
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        run: |
          jq -c '.dsseEnvelope // .' "$BUNDLE_PATH" \
            > generate_schemas-${{ matrix.target }}.intoto.jsonl
      - name: Upload release assets
        run: |
          gh release upload ${{ github.ref_name }} \
            generate_schemas-${{ matrix.target }} \
            generate_schemas-${{ matrix.target }}.bundle \
            generate_schemas-${{ matrix.target }}.intoto.jsonl \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}
