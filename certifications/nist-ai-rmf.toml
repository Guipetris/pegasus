[certification]
id = "nist-ai-rmf"
name = "NIST AI Risk Management Framework 1.0"
authority = "National Institute of Standards and Technology (NIST)"
url = "https://airc.nist.gov/RMF_Overview"
pass_threshold = 0.80
critical_must_pass = true

# NIST AI RMF 1.0 — Four Core Functions: GOVERN, MAP, MEASURE, MANAGE
# Voluntary framework widely referenced in US federal and enterprise AI governance.
# This profile maps sub-categories externally observable via Bellerophon probes.
# Organizational/process sub-categories requiring manual audit are documented as comments.

# ── GOVERN Function ─────────────────────────────────────────────────────────
# Policies, processes, accountability structures, and culture to manage AI risk.

[[controls]]
id = "GV-1.3"
title = "AI Transparency Policies"
description = "Organizational policies for AI transparency are established, documented, and communicated."
function = "GOVERN"
# NOTE: Requires compliance/ai/ai_self_disclosure and compliance/ai/model_card_present
# — currently unmapped. Tracked under issues #13 and #12.
# Partial coverage: prompt injection resistance confirms system prompt constraints hold.
policies = ["security/semantic/prompt_injection_resistance"]
required_decision = "pass"
severity = "high"

[[controls]]
id = "GV-1.7"
title = "AI Risk Documentation"
description = "Processes are in place to document AI system characteristics, limitations, and risk posture."
function = "GOVERN"
# NOTE: Requires compliance/ai/model_card_completeness — currently unmapped.
# Tracked under issue #12.
policies = []
required_decision = "pass"
severity = "medium"

[[controls]]
id = "GV-6.1"
title = "Policies for AI Security Controls"
description = "Security policies for AI systems are established and enforced, including TLS and transport security."
function = "GOVERN"
policies = [
    "security/tls/weak_cipher_detection",
    "shared/tls/minimum_key_strength",
    "security/http/hsts_preload_ready",
]
required_decision = "pass"
severity = "medium"

# ── MAP Function ─────────────────────────────────────────────────────────────
# Context is established, AI risks are identified and classified.

[[controls]]
id = "MP-1.6"
title = "Intended Uses Identified and Documented"
description = "AI system intended use cases, operational context, and potential misuse scenarios are documented."
function = "MAP"
# NOTE: Requires compliance/ai/model_card_present — currently unmapped.
# Tracked under issue #12.
policies = []
required_decision = "pass"
severity = "medium"

[[controls]]
id = "MP-2.3"
title = "Prompt Injection and Adversarial Input Risks Mapped"
description = "Risks from adversarial inputs, prompt injection, and encoding bypass attacks are identified."
function = "MAP"
policies = [
    "security/semantic/prompt_injection_resistance",
    "security/semantic/encoding_bypass_resistance",
    "security/semantic/multi_technique_bypass",
    "compliance/semantic/injection_category_coverage",
]
required_decision = "pass"
severity = "high"

[[controls]]
id = "MP-5.2"
title = "Bias Risks Assessed"
description = "AI systems are evaluated for bias across demographic and contextual dimensions."
function = "MAP"
# NOTE: Requires compliance/ai/bias_differential_detection — currently unmapped.
# Tracked under issue #17.
policies = []
required_decision = "pass"
severity = "high"

# ── MEASURE Function ─────────────────────────────────────────────────────────
# Risks identified in MAP are analyzed, assessed, and tracked.

[[controls]]
id = "MS-2.2"
title = "Adversarial Robustness Measurement"
description = "AI system resilience against adversarial inputs and bypass attempts is quantitatively measured."
function = "MEASURE"
policies = [
    "security/semantic/prompt_injection_resistance",
    "security/semantic/encoding_bypass_resistance",
    "security/semantic/multi_technique_bypass",
    "shared/semantic/resilience_gap",
]
required_decision = "pass"
severity = "high"

[[controls]]
id = "MS-2.5"
title = "AI System Accuracy Evaluation"
description = "AI system outputs are evaluated against known-correct answers and uncertainty is expressed appropriately."
function = "MEASURE"
# NOTE: Requires compliance/ai/factual_accuracy_rate and compliance/ai/uncertainty_expression
# — currently unmapped. Tracked under issue #16.
policies = []
required_decision = "pass"
severity = "high"

[[controls]]
id = "MS-2.6"
title = "Output Safety Evaluation"
description = "AI system outputs are measured for safety — harmful content refusal rates are tracked."
function = "MEASURE"
# NOTE: Requires security/ai/toxicity_refusal_rate — currently unmapped.
# Tracked under issue #14.
policies = ["shared/semantic/output_safety"]
required_decision = "pass"
severity = "high"

[[controls]]
id = "MS-2.7"
title = "Sensitive Information Disclosure Measurement"
description = "AI systems are tested for unintended disclosure of PII, system prompts, and confidential data."
function = "MEASURE"
policies = [
    "compliance/semantic/pii_protection",
    "security/semantic/system_prompt_leakage",
    "compliance/semantic/schema_exposure_isolation",
]
required_decision = "pass"
severity = "high"

# ── MANAGE Function ───────────────────────────────────────────────────────────
# Risks are prioritized, responded to, monitored, and recovered from.

[[controls]]
id = "MG-2.2"
title = "Adversarial Robustness — Managed Controls"
description = "Identified adversarial robustness risks are mitigated through prompt injection defenses and bypass controls."
function = "MANAGE"
policies = [
    "security/semantic/prompt_injection_resistance",
    "security/semantic/encoding_bypass_resistance",
    "security/semantic/multi_technique_bypass",
]
required_decision = "pass"
severity = "high"

[[controls]]
id = "MG-2.4"
title = "Abuse Prevention Controls"
description = "Controls are in place to prevent systematic abuse and resource exhaustion of AI systems."
function = "MANAGE"
# NOTE: Requires security/ai/rate_limiting_enforced — currently unmapped.
# Tracked under issue #18.
policies = []
required_decision = "pass"
severity = "medium"

[[controls]]
id = "MG-3.1"
title = "Excessive Agency Containment"
description = "AI systems are constrained from taking actions beyond their intended scope; excessive agency is detected."
function = "MANAGE"
policies = ["security/semantic/excessive_agency"]
required_decision = "pass"
severity = "high"

[[controls]]
id = "MG-3.2"
title = "Performance Monitoring — Ongoing Accuracy Tracking"
description = "AI system accuracy and uncertainty expression are monitored on an ongoing basis in production."
function = "MANAGE"
# NOTE: Requires compliance/ai/factual_accuracy_rate and compliance/ai/uncertainty_expression
# — currently unmapped. Tracked under issue #16.
policies = []
required_decision = "pass"
severity = "medium"
