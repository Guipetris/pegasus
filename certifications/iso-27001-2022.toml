[certification]
id = "iso-27001-2022"
name = "ISO/IEC 27001:2022 — Information Security Management System"
authority = "International Organization for Standardization (ISO) / International Electrotechnical Commission (IEC)"
url = "https://www.iso.org/standard/27001"
pass_threshold = 0.75
critical_must_pass = true

# ISO/IEC 27001:2022 Annex A — Information Security Controls
#
# IMPORTANT: ISO 27001:2022 certification requires formal audit and accredited
# third-party assessment. This profile covers only the externally verifiable,
# machine-probeable subset of Annex A controls. Use for pre-audit readiness
# assessment and continuous compliance monitoring — NOT as a substitute for
# formal certification.
#
# Controls are drawn from Annex A (93 controls across 4 categories). This
# profile covers Annex A.5 (Organizational), A.8 (Technological) controls
# that can be evaluated via network probes. Physical (A.7) and People (A.6)
# controls are out of scope for automated probing.
#
# Annex A categories covered:
#   A.5 — Organizational controls (A.5.14, A.5.16, A.5.17, A.5.22)
#   A.8 — Technological controls  (A.8.20–A.8.24, A.8.26, A.8.30)
#
# Out of scope for automated probing (requires audit evidence):
#   A.5.1–A.5.13  — Policies, roles, responsibilities
#   A.5.15–A.5.19 — Access control processes (partially covered by OIDC probes)
#   A.5.23–A.5.37 — Supplier, incident, business continuity management
#   A.6            — People controls (screening, training, confidentiality)
#   A.7            — Physical controls (facility, equipment)
#   A.8.1–A.8.19  — Asset inventory, classification, logging (process-dependent)
#   A.8.25–A.8.32 — Development lifecycle (process-dependent)

# ── A.8.20 Networks Security ────────────────────────────────────────────

[[controls]]
id = "A.8.20-TLS-PROTOCOL"
title = "A.8.20 — Network Security: TLS Protocol Version"
description = "Networks and network services must be secured against unauthorized access. TLS 1.2 or higher is required; deprecated versions (TLS 1.0, TLS 1.1) expose data in transit to known protocol downgrade attacks (POODLE, BEAST)."
policies = ["security/tls/weak_cipher_detection"]
required_decision = "pass"
severity = "critical"

[[controls]]
id = "A.8.20-CIPHER-SUITES"
title = "A.8.20 — Network Security: Cipher Suite Strength"
description = "Only approved cipher suites must be negotiated. Weak ciphers (RC4, DES, 3DES, NULL, EXPORT) indicate a failure of network security controls and expose data in transit to decryption."
policies = ["security/tls/weak_cipher_detection"]
required_decision = "pass"
severity = "critical"

[[controls]]
id = "A.8.20-SELF-SIGNED"
title = "A.8.20 — Network Security: No Self-Signed Certificates in Production"
description = "Production endpoints must not use self-signed certificates. Self-signed certificates cannot be verified by relying parties and signal a fundamental network security control gap."
policies = ["security/tls/self_signed_detection"]
required_decision = "pass"
severity = "critical"

[[controls]]
id = "A.8.20-CERT-CHAIN"
title = "A.8.20 — Network Security: Certificate Chain Validity"
description = "TLS certificate chain must be complete and trusted to a recognized root CA. A broken chain prevents clients from verifying the server's identity and may permit interception."
policies = ["shared/tls/certificate_chain_valid"]
required_decision = "pass"
severity = "critical"

[[controls]]
id = "A.8.20-CERT-EXPIRY"
title = "A.8.20 — Network Security: Certificate Validity Period"
description = "Server certificates must be within their validity period. An expired certificate disrupts service availability and indicates a failure of certificate lifecycle management."
policies = ["shared/tls/certificate_not_expired"]
required_decision = "pass"
severity = "critical"

[[controls]]
id = "A.8.20-HSTS"
title = "A.8.20 — Network Security: HTTP Strict Transport Security"
description = "HSTS must be present to enforce HTTPS-only connections and prevent SSL-stripping attacks. Without HSTS, an attacker performing a MITM attack can transparently downgrade connections."
policies = ["security/http/hsts_preload_ready"]
required_decision = "pass"
severity = "high"

[[controls]]
id = "A.8.20-CAA"
title = "A.8.20 — Network Security: CAA Records — Certificate Issuance Authorization"
description = "CAA DNS records must restrict which CAs may issue certificates for the domain. Without CAA records, any CA can issue certificates for the domain, increasing the blast radius of a CA compromise."
policies = ["dns/caa_records_present"]
required_decision = "pass"
severity = "medium"

[[controls]]
id = "A.8.20-CAA-IODEF"
title = "A.8.20 — Network Security: CAA IODEF Reporting"
description = "CAA iodef field should be present so that unauthorized issuance attempts are reported to the domain owner. This enables timely detection of certificate misissuance."
policies = ["compliance/dns/caa_iodef_present"]
required_decision = "pass"
severity = "low"

[[controls]]
id = "A.8.20-OCSP"
title = "A.8.20 — Network Security: OCSP Revocation Availability"
description = "OCSP responder must be available and reachable so that relying parties can check certificate revocation status. An unreachable OCSP responder degrades revocation checking."
policies = ["compliance/revocation/ocsp_responder_available"]
required_decision = "pass"
severity = "medium"

[[controls]]
id = "A.8.20-CT-MONITORING"
title = "A.8.20 — Network Security: Certificate Transparency Monitoring"
description = "Unexpected certificates issued for the entity's domains must be detectable via CT log monitoring. Unexplained CT entries are an early indicator of unauthorized certificate issuance."
policies = ["security/ct/unexpected_certificates"]
required_decision = "pass"
severity = "medium"

[[controls]]
id = "A.8.20-HOSTNAME"
title = "A.8.20 — Network Security: Hostname Validation"
description = "Certificate subject and SAN fields must match the probed hostname. A mismatch indicates a misconfiguration that clients would reject, or a certificate served for the wrong domain."
policies = ["compliance/tls/hostname_validation"]
required_decision = "pass"
severity = "critical"

[[controls]]
id = "A.8.20-ROBOTS"
title = "A.8.20 — Network Security: robots.txt Sensitive Path Disclosure"
description = "The robots.txt file must not disclose sensitive administrative or internal paths. Enumerating hidden paths via robots.txt assists attackers in identifying attack surface."
policies = ["security/http/robots_sensitive_paths"]
required_decision = "pass"
severity = "low"

# ── A.8.21 Security of Network Services ─────────────────────────────────

[[controls]]
id = "A.8.21-TLS13"
title = "A.8.21 — Security of Network Services: TLS 1.3 Preferred"
description = "TLS 1.3 should be preferred over TLS 1.2. TLS 1.3 eliminates weak cipher suites, mandates forward secrecy, and reduces the attack surface of the TLS handshake."
policies = ["shared/tls/tls13_preferred"]
required_decision = "pass"
severity = "medium"

[[controls]]
id = "A.8.21-ALPN"
title = "A.8.21 — Security of Network Services: ALPN Protocol Negotiation"
description = "ALPN must be supported to allow explicit protocol negotiation during the TLS handshake. Absence of ALPN may indicate an outdated TLS stack with limited security controls."
policies = ["shared/tls/alpn_protocol_supported"]
required_decision = "pass"
severity = "low"

# ── A.8.23 Web Filtering ─────────────────────────────────────────────────

[[controls]]
id = "A.8.23-CSP"
title = "A.8.23 — Web Filtering: Content Security Policy"
description = "CSP header must be present with a meaningful policy to restrict the sources from which content may be loaded. A missing or permissive CSP enables XSS exploitation."
policies = ["security/http/csp_policy_strength"]
required_decision = "pass"
severity = "medium"

[[controls]]
id = "A.8.23-CLICKJACKING"
title = "A.8.23 — Web Filtering: Clickjacking Protection"
description = "X-Frame-Options or CSP frame-ancestors must be set to prevent UI redressing attacks. Clickjacking can lead to unauthorized actions performed by authenticated users."
policies = ["security/http/x_frame_options_strength"]
required_decision = "pass"
severity = "medium"

[[controls]]
id = "A.8.23-SECURITY-HEADERS"
title = "A.8.23 — Web Filtering: Core Security Headers"
description = "X-Content-Type-Options must be present to prevent MIME sniffing attacks that enable content injection on older browsers."
policies = ["http/security_headers_present"]
required_decision = "pass"
severity = "medium"

[[controls]]
id = "A.8.23-CORS"
title = "A.8.23 — Web Filtering: CORS Wildcard Origin"
description = "CORS Access-Control-Allow-Origin must not be set to '*' for credentialed requests. A wildcard CORS policy allows any origin to read cross-origin responses, bypassing the same-origin policy."
policies = ["security/http/cors_wildcard_origin"]
required_decision = "pass"
severity = "high"

[[controls]]
id = "A.8.23-PERMISSIONS-POLICY"
title = "A.8.23 — Web Filtering: Permissions Policy"
description = "Permissions-Policy header should restrict access to browser features (geolocation, camera, microphone). Permissive feature policies expose users to unauthorized data collection."
policies = ["compliance/http/permissions_policy_present"]
required_decision = "pass"
severity = "low"

[[controls]]
id = "A.8.23-REFERRER"
title = "A.8.23 — Web Filtering: Referrer Policy"
description = "Referrer-Policy must be set to limit referrer information sent to third parties. Without a policy, sensitive URL parameters may be leaked via the Referer header."
policies = ["compliance/http/referrer_policy_present"]
required_decision = "pass"
severity = "low"

# ── A.8.24 Use of Cryptography ───────────────────────────────────────────

[[controls]]
id = "A.8.24-KEY-STRENGTH"
title = "A.8.24 — Use of Cryptography: Minimum Key Strength"
description = "Cryptographic keys must meet minimum length requirements: RSA >= 2048 bits, ECDSA >= P-256. Keys below these thresholds are vulnerable to brute-force attacks within current computational budgets."
policies = ["shared/tls/minimum_key_strength"]
required_decision = "pass"
severity = "high"

[[controls]]
id = "A.8.24-SHA1"
title = "A.8.24 — Use of Cryptography: SHA-1 Prohibition"
description = "SHA-1 must not be used in certificate signatures. Collision attacks against SHA-1 are practically demonstrated; collision-crafted certificates could be used to impersonate legitimate entities."
policies = ["shared/tls/sha1_signature_prohibition"]
required_decision = "pass"
severity = "high"

[[controls]]
id = "A.8.24-DEPRECATED-ALGO"
title = "A.8.24 — Use of Cryptography: No Deprecated Key Algorithms"
description = "Deprecated public-key algorithms (e.g., short RSA, DSA) must not be used. Deprecated algorithms have known weaknesses that undermine the confidentiality and integrity of encrypted communications."
policies = ["security/tls/deprecated_key_algorithm"]
required_decision = "pass"
severity = "high"

[[controls]]
id = "A.8.24-SAN-MATCH"
title = "A.8.24 — Use of Cryptography: SAN Hostname Match"
description = "Certificate Subject Alternative Names must match the hostname being served. A mismatch indicates a misconfiguration or a certificate served outside its authorized scope."
policies = ["compliance/tls/san_hostname_match"]
required_decision = "pass"
severity = "high"

[[controls]]
id = "A.8.24-CERT-LIFETIME"
title = "A.8.24 — Use of Cryptography: Certificate Rotation Cadence"
description = "Certificate validity periods must meet current industry maximums (<=398 days). Short-lived certificates with automated renewal indicate a mature cryptographic key management practice."
policies = ["compliance/tls/certificate_lifetime_short"]
required_decision = "pass"
severity = "medium"

[[controls]]
id = "A.8.24-EKU"
title = "A.8.24 — Use of Cryptography: Extended Key Usage — Server Authentication"
description = "Server certificates must include the id-kp-serverAuth extended key usage OID. Certificates without the correct EKU may be rejected by modern TLS clients or indicate misuse of a certificate."
policies = ["compliance/tls/extended_key_usage_server_auth"]
required_decision = "pass"
severity = "medium"

[[controls]]
id = "A.8.24-CABF"
title = "A.8.24 — Use of Cryptography: CA/Browser Forum Baseline Compliance"
description = "Certificates must comply with CA/Browser Forum Baseline Requirements. Non-compliant certificates indicate either a private CA not following industry baseline rules or an improperly issued public certificate."
policies = ["compliance/tls/cabf_baseline"]
required_decision = "pass"
severity = "medium"

# ── A.8.26 Application Security Requirements ─────────────────────────────

[[controls]]
id = "A.8.26-OIDC-STRONG-SIGNING"
title = "A.8.26 — Application Security: OIDC Token Signing Algorithm"
description = "OIDC identity tokens must be signed with asymmetric algorithms (RS256, ES256). Symmetric signing (HS256) prevents independent token verification by relying parties, undermining authentication integrity."
policies = ["compliance/oidc/strong_signing_required"]
required_decision = "pass"
severity = "critical"

[[controls]]
id = "A.8.26-OIDC-NO-IMPLICIT"
title = "A.8.26 — Application Security: OIDC Implicit Flow Disabled"
description = "The OIDC implicit flow (response_type=token) must be disabled. The implicit flow exposes tokens in URL fragments and browser history and has been deprecated in OAuth 2.1 due to security weaknesses."
policies = ["security/oidc/implicit_flow_detection"]
required_decision = "pass"
severity = "high"

[[controls]]
id = "A.8.26-JWKS-HTTPS"
title = "A.8.26 — Application Security: JWKS URI HTTPS-Only"
description = "The OIDC JWKS URI must use HTTPS. An HTTP JWKS endpoint allows attackers to substitute signing keys via a MITM attack, enabling arbitrary token forgery."
policies = ["security/oidc/jwks_uri_https"]
required_decision = "pass"
severity = "high"

[[controls]]
id = "A.8.26-OIDC-ISSUER"
title = "A.8.26 — Application Security: OIDC Issuer URI Match"
description = "The OIDC issuer URI in the discovery document must match the probed endpoint. An issuer mismatch indicates a misconfigured or spoofed identity provider."
policies = ["compliance/oidc/issuer_uri_match"]
required_decision = "pass"
severity = "medium"

# ── A.8.30 Outsourced Development / Supply Chain ─────────────────────────

[[controls]]
id = "A.8.30-SBOM"
title = "A.8.30 — Outsourced Development: Software Bill of Materials"
description = "A machine-readable SBOM must be available at /.well-known/sbom. SBOM availability demonstrates supply chain transparency and enables rapid response to third-party vulnerability disclosures."
policies = ["compliance/supply_chain/sbom_available"]
required_decision = "pass"
severity = "medium"

# ── A.5.14 Information Transfer ──────────────────────────────────────────

[[controls]]
id = "A.5.14-INFO-LEAKAGE"
title = "A.5.14 — Information Transfer: No Server Banner Leakage"
description = "HTTP responses must not expose internal platform details, stack traces, version strings, or infrastructure identifiers. Leaking implementation details aids attackers in tailoring exploits."
policies = ["http/info_leakage"]
required_decision = "pass"
severity = "medium"

# ── A.5.16 Identity Management ────────────────────────────────────────────

[[controls]]
id = "A.5.16-OIDC-DISCOVERY"
title = "A.5.16 — Identity Management: OIDC Discovery Endpoint"
description = "If OIDC is used, a discovery document must be present at /.well-known/openid-configuration. Discovery absence may indicate an unmaintained or misconfigured identity provider."
policies = ["policies/oidc/discovery_present"]
required_decision = "pass"
severity = "medium"

# ── A.5.17 Authentication Information ────────────────────────────────────

[[controls]]
id = "A.5.17-TOKEN-CONFIG"
title = "A.5.17 — Authentication Information: Secure Token Configuration"
description = "OIDC token endpoint configuration must enforce secure defaults. Insecure token configurations (e.g., overly permissive grants, no token expiry) undermine the authentication information controls."
policies = ["policies/oidc/secure_token_config"]
required_decision = "pass"
severity = "medium"

# ── A.5.22 Monitoring of Supplier Services ───────────────────────────────

[[controls]]
id = "A.5.22-SECURITY-TXT"
title = "A.5.22 — Monitoring of Supplier Services: Security Contact (security.txt)"
description = "A security.txt file must be present at /.well-known/security.txt. This enables responsible disclosure and demonstrates an active security contact process aligned with RFC 9116."
policies = ["compliance/http/security_txt_present"]
required_decision = "pass"
severity = "low"

[[controls]]
id = "A.5.22-RATE-LIMITING"
title = "A.5.22 — Monitoring of Supplier Services: Rate Limiting"
description = "Rate limiting headers (RateLimit-*, Retry-After, or X-RateLimit-*) must be present. Rate limiting provides availability protection against credential stuffing and enumeration attacks."
policies = ["security/http/rate_limiting_present"]
required_decision = "pass"
severity = "medium"
